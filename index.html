<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Icons/calculator.png" type="image/x-icon">
    <title>AGE CALCULATOR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container my-4 text-center">
        <h1 class="zen-dots-regular mb-4">AGE CALCULATOR</h1>

        <div class="row justify-content-center">

            <form id="ageForm" class="col-sm-8">
                <div class="row g-3">
                    <div class="col">
                        <input type="text" id="firstName" class="form-control" placeholder="First name" required>
                    </div>
                    <div class="col">
                        <input type="text" id="lastName" class="form-control" placeholder="Last name" required>
                    </div>
                </div>
                <div class="mt-4">
                    <h5 class="mb-3 zen-dots-regular">BIRTHDAY</h5>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <input type="number" id="year" class="form-control" placeholder="Year" min="1900" max="2100" required>
                        </div>
                        <div class="col-md-4">
                            <select id="month" class="form-select" required>
                                <option selected disabled value="">Select Month</option>
                                <option value="0">January</option>
                                <option value="1">February</option>
                                <option value="2">March</option>
                                <option value="3">April</option>
                                <option value="4">May</option>
                                <option value="5">June</option>
                                <option value="6">July</option>
                                <option value="7">August</option>
                                <option value="8">September</option>
                                <option value="9">October</option>
                                <option value="10">November</option>
                                <option value="11">December</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <input type="number" id="day" class="form-control" placeholder="Date" min="1" max="31" required>
                        </div>
                    </div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary w-100 zen-dots-regular text-uppercase">Calculate Age</button>
                </div>
            </form>

            <div id="result" class="mt-4 result-box"></div>

        </div>
    </div> 
    <script src="script.js"></script>
</body>
</html>
